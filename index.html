<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Be Beach · Gestion boutique</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#8FB9C7" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
  :root{
    --bg:#FBF6EC; --sand:#F0E4CC; --sand-deep:#E4D2A8;
    --sky:#8FB9C7; --sky-deep:#5F93A4;
    --coral:#E4886B; --coral-deep:#D3714F;
    --sage:#93A583; --ink:#3B362C; --ink-soft:#7A7362;
    --card:#FFFDF8; --line:#E9DFC7;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'DM Sans','Inter',sans-serif;color:var(--ink);
    background:
      linear-gradient(rgba(251,246,236,0.45), rgba(251,246,236,0.55)),
      url('fond-plage.jpg') no-repeat center top fixed;
    background-size:cover;
    min-height:100vh;
  }
  .serif{font-family:'Fraunces',serif;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--sand-deep);border-radius:8px;}
  button{font-family:inherit;}
  input, select{font-family:inherit;}
  a{color:inherit;}

  .header{position:relative;background:linear-gradient(120deg,var(--sky),var(--sky-deep));padding:22px 24px 40px;}
  .header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-badge{height:88px;padding:8px 18px;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
  .logo-badge img{height:100%;width:auto;display:block;}
  .logo-name{font-family:'Fraunces',serif;font-weight:600;font-size:17px;color:var(--ink);}
  .logo-sub{font-size:10px;letter-spacing:1px;color:var(--ink-soft);text-transform:uppercase;}
  .nav{display:flex;gap:8px;flex-wrap:wrap;}
  .nav-btn{display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:999px;border:none;background:rgba(255,255,255,0.18);color:#fff;font-weight:600;font-size:13.5px;cursor:pointer;}
  .nav-btn.active{background:#fff;color:var(--sky-deep);}
  .wave{position:absolute;bottom:-1px;left:0;width:100%;height:40px;display:block;}

  .container{padding:0 24px 40px;max-width:1120px;margin:0 auto;}
  .stat-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px;}
  .stat-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 20px;flex:1 1 180px;min-width:160px;box-shadow:0 2px 10px rgba(59,54,44,0.05);}
  .stat-label{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
  .stat-value{font-family:'Fraunces',serif;font-size:28px;font-weight:600;}
  .stat-sub{font-size:12px;color:var(--ink-soft);margin-top:4px;}

  .grid2{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 2px 10px rgba(59,54,44,0.05);}
  .panel-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .muted{color:var(--ink-soft);font-size:13.5px;}
  .sale-row{display:flex;justify-content:space-between;font-size:13.5px;border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:10px;}
  .lowstock-row{display:flex;align-items:center;gap:10px;font-size:13.5px;margin-bottom:10px;}

  .thumb{border-radius:12px;object-fit:cover;background:var(--sand);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .thumb-fallback{background:var(--sand);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);}

  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .search-wrap{position:relative;flex:1 1 220px;max-width:340px;}
  .search-wrap svg{position:absolute;left:12px;top:11px;}
  .input, select.input{border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:14px;color:var(--ink);background:#fff;outline:none;width:100%;}
  .btn{border:none;border-radius:12px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:transform 0.12s ease, box-shadow 0.12s ease;}
  .btn-coral{background:var(--coral);color:#fff;box-shadow:0 3px 10px rgba(228,136,107,0.35);}
  .btn-sage{background:var(--sage);color:#fff;box-shadow:0 3px 10px rgba(147,165,131,0.35);}
  .btn-outline{background:#fff;border:1px solid var(--line);color:var(--ink);}
  .btn:not(:disabled):hover{transform:translateY(-1px);}
  .btn:disabled{background:var(--sand-deep);cursor:not-allowed;box-shadow:none;}

  .pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;}
  .pill{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--ink);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}
  .pill.active{background:var(--sky);border-color:var(--sky-deep);color:#fff;}

  .stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;}
  .stock-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(59,54,44,0.05);transition:box-shadow 0.15s ease;}
  .stock-card:hover{box-shadow:0 4px 16px rgba(59,54,44,0.09);}
  .stock-top{display:flex;gap:12px;margin-bottom:10px;}
  .stock-name{font-weight:600;font-size:14px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .stock-meta{font-size:12px;color:var(--ink-soft);margin-bottom:4px;}
  .stock-code-row{display:flex;align-items:center;gap:6px;margin-top:2px;}
  .stock-code{font-size:10.5px;color:var(--ink-soft);font-family:monospace;letter-spacing:0.3px;}
  .price{font-weight:700;color:var(--sky-deep);}
  .variant-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:8px;margin:10px 0;}
  .variant-cell{border:1px solid var(--line);border-radius:10px;padding:8px 6px;text-align:center;background:#fff;}
  .variant-cell-size{font-size:11px;font-weight:700;letter-spacing:0.3px;color:var(--ink-soft);text-transform:uppercase;margin-bottom:3px;}
  .variant-cell-stock{font-size:19px;font-weight:700;}
  .variant-size{width:38px;flex-shrink:0;font-weight:600;color:var(--ink-soft);}
  .variant-stock{flex:1;font-weight:600;}
  .stock-actions{display:flex;gap:8px;margin-top:8px;}
  .btn-sm{padding:5px 10px;font-size:12px;border-radius:10px;}
  .mini-btn{width:20px;height:20px;border-radius:50%;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;flex-shrink:0;}

  .vente-layout{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;align-items:start;}
  .vente-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;}
  .vente-tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px;box-shadow:0 2px 8px rgba(59,54,44,0.05);}
  .vente-tile-name{font-size:12.5px;font-weight:600;margin-top:8px;line-height:1.2;}
  .vente-tile-meta{font-size:11.5px;color:var(--ink-soft);margin:2px 0;}
  .size-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
  .size-chip{border:1px solid var(--line);background:#fff;border-radius:7px;padding:3px 6px;font-size:11px;font-weight:600;cursor:pointer;color:var(--ink);}
  .size-chip:disabled{opacity:0.35;cursor:not-allowed;text-decoration:line-through;}
  .size-chip:not(:disabled):hover{background:var(--sky);color:#fff;border-color:var(--sky-deep);}

  .cart{position:sticky;top:16px;}
  .cart-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .qty-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
  .cart-total{border-top:1px solid var(--line);padding-top:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .cart-total-value{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--coral-deep);}

  details{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 16px;margin-bottom:10px;}
  summary{display:flex;justify-content:space-between;cursor:pointer;font-size:13.5px;list-style:none;}
  summary::-webkit-details-marker{display:none;}
  .vente-detail-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}

  .modal-backdrop{position:fixed;inset:0;background:rgba(59,54,44,0.35);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
  .modal{background:var(--card);border-radius:20px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 12px 40px rgba(59,54,44,0.25);}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .modal-close{background:none;border:none;cursor:pointer;color:var(--ink-soft);}
  .field{display:flex;flex-direction:column;gap:5px;font-size:12.5px;color:var(--ink-soft);margin-bottom:12px;}
  .field-row{display:flex;gap:10px;}
  .hint{font-size:11.5px;color:var(--ink-soft);margin-top:-6px;margin-bottom:12px;}
  .modal-actions{display:flex;gap:10px;margin-top:8px;}

  .variant-editor{border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:12px;}
  .variant-editor-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .variant-editor-row input{flex:1;}
  .variant-editor-row input.taille-input{max-width:80px;flex:none;}
  .add-size-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .add-size-btn{border:1px dashed var(--line);background:#fff;border-radius:8px;padding:5px 9px;font-size:11.5px;cursor:pointer;color:var(--ink-soft);}

  .color-block{border:1.5px solid var(--sky);border-radius:14px;padding:14px;margin-bottom:14px;background:#fff;}
  .color-block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .color-block-title{font-family:'Fraunces',serif;font-weight:600;font-size:14px;color:var(--sky-deep);}
  .color-preview-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
  .discount-badge{display:inline-block;background:var(--coral);color:#fff;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:6px;}
  .price-preview{font-size:12px;color:var(--ink-soft);margin-top:-6px;margin-bottom:10px;}
  .price-preview b{color:var(--coral-deep);font-size:14px;}

  .loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;color:var(--ink-soft);font-size:14px;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;padding:12px 20px;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,0.2);display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;z-index:100;max-width:90vw;text-align:center;animation:toast-in 0.2s ease;}
  @keyframes toast-in{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}

  .sale-confirm{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding:36px 12px;color:var(--sage);animation:toast-in 0.25s ease;}
  .sale-confirm svg{width:40px;height:40px;}
  .sale-confirm-title{font-family:'Fraunces',serif;font-size:19px;font-weight:700;color:var(--ink);}
  .sale-confirm-detail{font-size:13px;color:var(--ink-soft);}

  .mini-cart-bar{display:none;}

  html{overflow-x:hidden;}
  body{overflow-x:hidden;}
  /* Flex/grid items default to a content-based minimum width that can silently
     force horizontal overflow on narrow screens, even with width:100% set.
     This is the actual root cause of the mobile overflow — fix it globally. */
  select, input, .field, .vente-layout > *, .grid2 > *, .cart-row, .cart-row > div{ min-width:0; }

  @media (max-width: 720px){
    .grid2, .vente-layout{grid-template-columns:1fr;}
  }

  @media (max-width: 600px){
    .header{padding:16px 14px 34px;}
    .logo-badge{height:56px;padding:6px 12px;}
    .logo-sub{font-size:9px;}
    .nav-btn{padding:8px 12px;font-size:12.5px;}
    .container{padding:0 12px 32px;}

    .stat-row{gap:10px;}
    .stat-card{flex:1 1 calc(50% - 10px);min-width:0;padding:14px 14px;}
    .stat-value{font-size:22px;}

    .toolbar{gap:8px;}
    .search-wrap{max-width:none;flex:1 1 100%;}

    .field-row{flex-direction:column;gap:10px;}
    .field-row .field{width:100%;}

    .stock-grid{grid-template-columns:1fr;}
    .vente-grid{grid-template-columns:repeat(2, 1fr);gap:8px;}
    .vente-tile{padding:8px;}

    .stock-top{gap:8px;}
    .stock-actions{flex-wrap:wrap;}

    .modal{padding:18px;max-width:100%;}

    .variant-editor-row{flex-wrap:wrap;}
    .variant-editor-row input.taille-input{max-width:none;flex:1 1 90px;}

    table, .panel{max-width:100%;}
    .sale-row{flex-wrap:wrap;gap:4px;}

    .mini-cart-bar{
      display:flex;align-items:center;justify-content:center;gap:8px;
      position:fixed;left:12px;right:12px;bottom:14px;z-index:90;
      background:var(--sage);color:#fff;border:none;border-radius:999px;
      padding:13px;font-size:13.5px;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,0.25);
      cursor:pointer;
    }
  }
</style>
</head>

function euros(n){
  return (Number(n)||0).toLocaleString('fr-FR', { style:'currency', currency:'EUR' });
}
function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function uid(){ return Math.random().toString(36).slice(2,10); }
function qrUrl(code, size){ return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(code)}`; }
function randomCode(){ return 'BB-' + Math.floor(1000 + Math.random()*9000); }
function prixRemise(color){
  const prix = Number(color.prix) || 0;
  const remise = Number(color.remise) || 0;
  return +(prix * (1 - remise/100)).toFixed(2);
}

async function withRetry(fn, retries){
  retries = retries == null ? 1 : retries;
  try{ return await fn(); }
  catch(err){
    if (retries > 0){
      await new Promise(r => setTimeout(r, 900));
      return withRetry(fn, retries - 1);
    }
    throw err;
  }
}

};

function totalStock(article){
  return article.colors.reduce((s,c) => s + c.variants.reduce((s2,v) => s2 + v.stock, 0), 0);
}
function lowEntries(article){
  const out = [];
  article.colors.forEach(c => c.variants.forEach(v => { if (v.stock <= article.seuil) out.push({ color:c, variant:v }); }));
  return out;
}
function stockValueOf(article){
  return article.colors.reduce((s,c) => s + c.variants.reduce((s2,v) => s2 + v.stock, 0) * prixRemise(c), 0);
}

// ---------- Data loading ----------
async function loadAll(){
  state.loading = true; render();
  try{
    const [{ data: articles, error: e1 }, { data: ventes, error: e2 }, { data: clotures, error: e3 }, { data: lieux, error: e4 }] = await Promise.all([
      withRetry(() => sb.from('articles').select('*, article_colors(*, article_variants(*))').order('created_at', { ascending: false })),
      withRetry(() => sb.from('ventes').select('*').order('date', { ascending: false }).limit(500)),
      withRetry(() => sb.from('cloture_caisse').select('*')),
      withRetry(() => sb.from('lieux_vente').select('*').order('created_at', { ascending: true }))
    ]);
    if (e1) throw e1;
    if (e2) throw e2;
    if (e3) throw e3;
    if (e4) throw e4;
    state.articles = (articles || []).map(a => ({
      id: a.id, nom: a.nom, collection: a.collection, seuil: a.seuil,
      colors: (a.article_colors || []).map(c => ({
        id: c.id, couleur: c.couleur, code: c.code, prix: Number(c.prix), remise: Number(c.remise||0), photo: c.photo,
        variants: sortVariants((c.article_variants || []).map(v => ({ id: v.id, taille: v.taille, stock: v.stock })))
      }))
    }));
    state.ventes = ventes || [];
    state.clotures = clotures || [];
    state.lieux = lieux || [];
    if (!state.lieux.some(l => l.nom === state.lieuVente) && state.lieux.length) state.lieuVente = state.lieux[0].nom;
    if (!state.lieux.some(l => l.nom === state.caisseLieu) && state.lieux.length) state.caisseLieu = state.lieux[0].nom;
    prefillCaisseForm();
    state.error = null;
  } catch(err){
    console.error(err);
    state.error = "Impossible de charger les données depuis Supabase. Vérifie la connexion.";
  }
  state.loading = false;
  render();
}

// ---------- Flattened product cards (article x color) ----------
function flattenCards(){
  const cards = [];
  state.articles.forEach(a => a.colors.forEach(c => cards.push({ article: a, color: c })));
  return cards;
}
function matchesQuery(a, c, query){
  const q = query.trim().toLowerCase();
  if (!q) return true;
  return a.nom.toLowerCase().includes(q) || (c.code||'').toLowerCase().includes(q) || (c.couleur||'').toLowerCase().includes(q);
}
function filteredCards(query){
  return flattenCards().filter(({article:a, color:c}) => {
    const matchCol = state.collectionFilter === 'Toutes' || a.collection === state.collectionFilter;
    return matchCol && matchesQuery(a, c, query);
  });
}
function findColorById(colorId){
  for (const a of state.articles){
    const c = a.colors.find(x => x.id === colorId);
    if (c) return { article: a, color: c };
  }
  return null;
}
function findVariant(colorId, taille){
  const found = findColorById(colorId);
  return found ? found.color.variants.find(v => v.taille === taille) : null;
}

function renderPreservingFocus(){
  const active = document.activeElement;
  const id = active && active.id;
  const pos = active && typeof active.selectionStart === 'number' ? active.selectionStart : null;
  render();

// ---------- Scan to add (camera QR/barcode + hardware scanner input) ----------
function lookupAndAddByCode(code){
  const trimmed = (code || '').trim();
  if (!trimmed) return;
  const found = flattenCards().find(({color:c}) => (c.code||'').toLowerCase() === trimmed.toLowerCase());
  if (!found){
    showToast(`Aucun article trouvé pour le code "${trimmed}"`, 'error');
    return;
  }
  const { article, color } = found;
  const inStock = color.variants.filter(v => v.stock > 0);
  if (color.variants.length === 1){
    addToPanier(color.id, color.variants[0].taille);
    showToast(`Ajouté au panier : ${article.nom} (${color.couleur})`, 'success');
  } else if (inStock.length === 1){
    addToPanier(color.id, inStock[0].taille);
    showToast(`Ajouté au panier : ${article.nom} (${color.couleur}) — ${inStock[0].taille}`, 'success');
  } else if (inStock.length === 0){
    showToast(`"${article.nom}" (${color.couleur}) est en rupture sur toutes les tailles`, 'error');
  } else {
    state.scanPendingColor = color.id;
    render();
    const cartEl = document.getElementById('cart-panel');
    if (cartEl) cartEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}
function pickScanSize(colorId, taille){
  addToPanier(colorId, taille);
  state.scanPendingColor = null;
  render();
}
function cancelScanPending(){ state.scanPendingColor = null; render(); }
function onScanInputKeydown(e){
  if (e.key === 'Enter'){
    e.preventDefault();
    lookupAndAddByCode(e.target.value);
    e.target.value = '';
  }
}
function lookupAndEditByCode(code){
  const trimmed = (code || '').trim();
  if (!trimmed) return;
  const found = flattenCards().find(({color:c}) => (c.code||'').toLowerCase() === trimmed.toLowerCase());
  if (!found){
    showToast(`Aucun article trouvé pour le code "${trimmed}"`, 'error');
    return;
  }
  showToast(`Article trouvé : ${found.article.nom}`, 'success');
  openEditForm(found.article.id);
}
function onStockScanInputKeydown(e){
  if (e.key === 'Enter'){
    e.preventDefault();
    lookupAndEditByCode(e.target.value);
    e.target.value = '';
  }
}

let html5QrCodeInstance = null;
function openScanner(mode){
  if (typeof Html5Qrcode === 'undefined'){
    showToast('Le scanner ne peut pas se charger (connexion internet nécessaire).', 'error');
    return;
  }
  const overlay = document.createElement('div');
  overlay.id = 'scanner-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;';
  overlay.innerHTML = `
    <div style="background:#FFFDF8;border-radius:16px;padding:16px;max-width:420px;width:100%;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-family:'Fraunces',serif;font-weight:600;color:#3B362C;">Scanner un article</div>
        <button id="scanner-close-btn" style="background:none;border:none;font-size:22px;cursor:pointer;color:#3B362C;line-height:1;">×</button>
      </div>
      <div id="qr-reader" style="width:100%;"></div>
      <div style="font-size:12px;color:#7A7362;margin-top:8px;">Vise le QR code (ou code-barres) de l'article avec la caméra.</div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('scanner-close-btn').onclick = closeScannerUI;

  html5QrCodeInstance = new Html5Qrcode('qr-reader');
  html5QrCodeInstance.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 230, height: 230 } },
    (decodedText) => {
      if (mode === 'stock') lookupAndEditByCode(decodedText);
      else lookupAndAddByCode(decodedText);
      closeScannerUI();
    },
    () => {}
  ).catch((err) => {
    showToast("Impossible d'accéder à la caméra : vérifie les autorisations du navigateur.", 'error');
    closeScannerUI();
    console.error(err);
  });
}
function closeScannerUI(){
  const overlay = document.getElementById('scanner-overlay');
  const inst = html5QrCodeInstance;
  html5QrCodeInstance = null;
  if (inst){
    inst.stop().then(() => inst.clear()).catch(() => {});
  }
  if (overlay) overlay.remove();
}

async function saveArticleForm(e){
  e.preventDefault();
  const f = e.target;
  const articlePayload = {
    nom: f.nom.value.trim(),
    collection: f.collection.value,
    seuil: parseInt(f.seuil.value) || 0,
  };
  if (!articlePayload.nom || state.formColors.length === 0) return;
  const colorsToSave = state.formColors.filter(c => c.couleur.trim() !== '' && c.code.trim() !== '');
  if (colorsToSave.length === 0){
    alert('Ajoute au moins une couleur avec un nom et un code.');
    return;
  }

  state.saving = true; render();
  try{
    let articleId;
    if (state.editing){
      articleId = state.editing.id;
      const { error } = await sb.from('articles').update(articlePayload).eq('id', articleId);
      if (error) throw error;

      const originalColorIds = new Set(state.editing.colors.map(c => c.id));
      const keptColorIds = new Set(colorsToSave.filter(c => c.dbId).map(c => c.dbId));
      const colorsToDelete = [...originalColorIds].filter(id => !keptColorIds.has(id));
      for (const id of colorsToDelete){
        const { error: de } = await sb.from('article_colors').delete().eq('id', id);
        if (de) throw de;
      }
    } else {
      const { data, error } = await sb.from('articles').insert(articlePayload).select().single();
      if (error) throw error;
      articleId = data.id;
    }

    for (const c of colorsToSave){
      const variantsToSave = c.variants.filter(v => v.taille.trim() !== '');
      if (variantsToSave.length === 0) continue;
      const colorPayload = {
        article_id: articleId,
        couleur: c.couleur.trim(),
        code: c.code.trim(),
        prix: parseFloat(c.prix) || 0,
        remise: parseFloat(c.remise) || 0,
        photo: c.photo.trim(),
      };
      let colorId;
      if (c.dbId){
        colorId = c.dbId;
        const { error: ce } = await sb.from('article_colors').update(colorPayload).eq('id', colorId);
        if (ce) throw ce;
        const originalColor = state.editing.colors.find(oc => oc.id === c.dbId);
        const originalVariantIds = new Set((originalColor ? originalColor.variants : []).map(v => v.id));
        const keptVariantIds = new Set(variantsToSave.filter(v => v.dbId).map(v => v.dbId));
        const variantsToDelete = [...originalVariantIds].filter(id => !keptVariantIds.has(id));
        for (const id of variantsToDelete){
          const { error: dve } = await sb.from('article_variants').delete().eq('id', id);
          if (dve) throw dve;
        }
      } else {
        const { data: cdata, error: ce } = await sb.from('article_colors').insert(colorPayload).select().single();
        if (ce) throw ce;
        colorId = cdata.id;
      }
      for (const v of variantsToSave){
        if (v.dbId){
          const { error: ue } = await sb.from('article_variants').update({ taille: v.taille.trim(), stock: v.stock }).eq('id', v.dbId);
          if (ue) throw ue;
        } else {
          const { error: ie } = await sb.from('article_variants').insert({ color_id: colorId, taille: v.taille.trim(), stock: v.stock });
          if (ie) throw ie;
        }
      }
    }

    state.showForm = false;
    state.editing = null;
    state.formColors = [];
    await loadAll();
  } catch(err){
    console.error(err);
    alert("Erreur lors de l'enregistrement : " + err.message);
  }
  state.saving = false;
  render();
}

function askDelete(id){ state.confirmDelete = id; render(); }
async function deleteArticle(id){

    if (error) throw error;
    const removedColorIds = new Set((state.articles.find(a=>a.id===id)?.colors||[]).map(c=>c.id));
    state.panier = state.panier.filter(p => !removedColorIds.has(p.colorId));

  }
  state.confirmDelete = null;
  render();

async function adjustVariantStock(variantId, delta){
  let targetVariant = null;
  for (const a of state.articles){
    for (const c of a.colors){
      const v = c.variants.find(x => x.id === variantId);
      if (v){ targetVariant = v; break; }
    }
    if (targetVariant) break;
  }
  if (!targetVariant) return;
  const newStock = Math.max(0, targetVariant.stock + delta);
  targetVariant.stock = newStock;
  render();
  try{
    const { error } = await sb.from('article_variants').update({ stock: newStock }).eq('id', variantId);
    if (error) throw error;
  } catch(err){
    console.error(err);
    await loadAll();
  }
}

// ---------- Actions: vente / panier ----------
function addToPanier(colorId, taille){
  const variant = findVariant(colorId, taille);
  if (!variant) return;
  const existing = state.panier.find(p => p.colorId === colorId && p.taille === taille);
  const currentQty = existing ? existing.qty : 0;
  if (currentQty >= variant.stock) return;
  if (existing) existing.qty += 1;
  else state.panier.push({ colorId, taille, qty: 1 });
  recalcLastReglement();
  render();
  const cartEl = document.getElementById('cart-panel');
  if (cartEl && window.innerWidth < 721) cartEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function changeQty(colorId, taille, delta){
  const variant = findVariant(colorId, taille);
  const p = state.panier.find(x => x.colorId === colorId && x.taille === taille);
  if (!p || !variant) return;
  p.qty = Math.min(variant.stock, Math.max(0, p.qty + delta));
  state.panier = state.panier.filter(x => x.qty > 0);
  recalcLastReglement();
  render();
}
function panierDetail(){
  return state.panier.map(p => {
    const found = findColorById(p.colorId);
    return found ? { ...p, article: found.article, color: found.color } : null;
  }).filter(Boolean);
}
function panierTotal(){
  return panierDetail().reduce((s,p) => s + prixRemise(p.color) * p.qty, 0);
}

// ---------- Multi-payment (reglements) ----------
function recalcLastReglement(){
  const total = panierTotal();
  if (state.reglements.length < 2){
    state.reglements[0].montant = total;
    return;
  }
  const others = state.reglements.slice(0, -1).reduce((s,r) => s + (parseFloat(r.montant) || 0), 0);
  state.reglements[state.reglements.length - 1].montant = +(total - others).toFixed(2);
}
function addReglementLine(){
  const usedModes = new Set(state.reglements.map(r => r.mode));
  const nextMode = MODES_REGLEMENT.find(m => !usedModes.has(m)) || MODES_REGLEMENT[0];
  state.reglements.push({ mode: nextMode, montant: 0 });
  recalcLastReglement();
  render();
}
function removeReglementLine(idx){
  state.reglements.splice(idx,1);
  if (state.reglements.length === 0) state.reglements.push({ mode:'CB', montant: 0 });
  recalcLastReglement();
  render();
}
function setReglementMode(idx, mode){ state.reglements[idx].mode = mode; render(); }
function updateReglementMontant(idx, value){
  state.reglements[idx].montant = value === '' ? '' : parseFloat(value) || 0;
  recalcLastReglement();
  renderPreservingFocus();
}
function reglementsTotal(){
  return state.reglements.reduce((s,r) => s + (parseFloat(r.montant) || 0), 0);
}
function reglementsRemaining(){
  return +(panierTotal() - reglementsTotal()).toFixed(2);
}

async function encaisser(){
  const detail = panierDetail();
  if (detail.length === 0) return;
  const total = panierTotal();
  if (Math.abs(reglementsRemaining()) > 0.004){
    alert("Le total des règlements (" + euros(reglementsTotal()) + ") ne correspond pas au total de la vente (" + euros(total) + "). Ajuste les montants avant d'encaisser.");
    return;
  }
  const items = detail.map(p => ({ nom: p.article.nom, couleur: p.color.couleur, taille: p.taille, qty: p.qty, prixUnitaire: prixRemise(p.color) }));
  const reglementsToSave = state.reglements.map(r => ({ mode: r.mode, montant: parseFloat(r.montant) || 0 }));
  const lieu = state.lieuVente;
  state.saving = true; render();
  try{
    const { error: e1 } = await withRetry(() => sb.from('ventes').insert({ date: new Date().toISOString(), items, total, reglements: reglementsToSave, lieu_vente: lieu }));
    if (e1) throw e1;
    for (const p of detail){
      const variant = findVariant(p.colorId, p.taille);
      const { error: e2 } = await withRetry(() => sb.from('article_variants').update({ stock: variant.stock - p.qty }).eq('id', variant.id));
      if (e2) throw e2;
    }
    state.panier = [];
    state.reglements = [{ mode:'CB', montant: 0 }];
    await loadAll();
    const modesLabel = reglementsToSave.map(r => `${r.mode} ${euros(r.montant)}`).join(' + ');
    state.saleConfirmation = { message: `Vente enregistrée · ${euros(total)}`, detail: `${modesLabel} · ${lieu}` };
    render();
    setTimeout(() => { state.saleConfirmation = null; render(); }, 4500);
  } catch(err){
    console.error(err);
    const msg = /522|timeout|network|fetch/i.test(String(err.message||err))
      ? "Le réseau a coupé un instant pendant l'encaissement. Vérifie l'onglet Historique : si la vente n'y est pas, réessaie."
      : "Erreur lors de l'encaissement : " + err.message;
    showToast(msg, 'error');
  }
  state.saving = false;
  render();
}

// ---------- Caisse (end-of-day register check) ----------
function dateOnly(iso){ return String(iso).slice(0,10); }
function findCloture(date, lieu){
  return state.clotures.find(c => c.date === date && c.lieu_vente === lieu) || null;
}
function setCaisseDate(d){ state.caisseDate = d; prefillCaisseForm(); render(); }
function setCaisseLieu(l){ state.caisseLieu = l; prefillCaisseForm(); render(); }
function prefillCaisseForm(){
  const c = findCloture(state.caisseDate, state.caisseLieu);
  state.caisseFondCaisse = c ? String(c.fond_caisse) : '';
  state.caisseComptageReel = c && c.comptage_reel != null ? String(c.comptage_reel) : '';
  state.caisseNote = c ? (c.note || '') : '';
}
function updateCaisseField(field, value){ state[field] = value; renderPreservingFocus(); }
function ventesForCaisse(){
  return state.ventes.filter(v => v.lieu_vente === state.caisseLieu && dateOnly(v.date) === state.caisseDate);
}
function ventesForDateAllLieux(){
  return state.ventes.filter(v => dateOnly(v.date) === state.caisseDate);
}
function reglementTotalsFor(rows){
  const totals = {};
  MODES_REGLEMENT.forEach(m => totals[m] = 0);
  rows.forEach(v => (v.reglements||[]).forEach(r => { totals[r.mode] = (totals[r.mode] || 0) + Number(r.montant); }));
  return totals;
}
async function saveCloture(){
  const fond = parseFloat(state.caisseFondCaisse) || 0;
  const comptage = state.caisseComptageReel === '' ? null : (parseFloat(state.caisseComptageReel) || 0);
  state.saving = true; render();
  try{
    const { error } = await withRetry(() => sb.from('cloture_caisse').upsert({
      date: state.caisseDate, lieu_vente: state.caisseLieu, fond_caisse: fond, comptage_reel: comptage, note: state.caisseNote || null,
    }, { onConflict: 'date,lieu_vente' }));
    if (error) throw error;
    await loadAll();
    showToast('Clôture de caisse enregistrée pour le ' + new Date(state.caisseDate).toLocaleDateString('fr-FR') + ' · ' + state.caisseLieu, 'success');
  } catch(err){
    console.error(err);
    showToast("Erreur lors de l'enregistrement de la clôture : " + err.message, 'error');
  }
  state.saving = false;
  render();
}

// ---------- Excel export ----------
function setExportRange(kind){
  const now = new Date();
  let from, to;
  if (kind === 'semaine'){
    const day = (now.getDay() + 6) % 7;
    from = new Date(now); from.setDate(now.getDate() - day);
    to = new Date(now);
  } else if (kind === 'mois'){
    from = new Date(now.getFullYear(), now.getMonth(), 1);
    to = new Date(now);
  } else { from = null; to = null; }
  state.exportFrom = from ? from.toISOString().slice(0,10) : '';
  state.exportTo = to ? to.toISOString().slice(0,10) : '';
  render();
}
function setExportLieu(l){ state.exportLieu = l; render(); }
function updateExportField(field, value){ state[field] = value; renderPreservingFocus(); }
function ventesForExport(){
  return state.ventes.filter(v => {
    const d = dateOnly(v.date);
    if (state.exportFrom && d < state.exportFrom) return false;
    if (state.exportTo && d > state.exportTo) return false;
    if (state.exportLieu !== 'Tous' && v.lieu_vente !== state.exportLieu) return false;
    return true;
  });
}
function downloadVentesAsExcel(rows, filenameLabel){
  if (rows.length === 0){ showToast('Aucune vente à exporter pour cette sélection.', 'error'); return; }
  const data = rows.map(v => {
    const d = new Date(v.date);
    const reglementsStr = (v.reglements||[]).map(r => `${r.mode}: ${Number(r.montant).toFixed(2)}€`).join(' + ');
    const articlesStr = (v.items||[]).map(it => `${it.qty}x ${it.nom}${it.couleur?' ('+it.couleur+')':''}${it.taille?' - '+it.taille:''}`).join(', ');
    return {
      'Date': d.toLocaleDateString('fr-FR'), 'Heure': d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
      'Lieu de vente': v.lieu_vente || '', 'Articles': articlesStr,
      'Nb articles': (v.items||[]).reduce((s,it)=>s+it.qty,0), 'Total (€)': Number(v.total), 'Règlements': reglementsStr,
    };
  });
  const totalGeneral = rows.reduce((s,v)=>s+Number(v.total),0);
  data.push({ 'Date':'', 'Heure':'', 'Lieu de vente':'', 'Articles':'', 'Nb articles':'', 'Total (€)': totalGeneral, 'Règlements': 'TOTAL' });
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{wch:11},{wch:7},{wch:16},{wch:45},{wch:10},{wch:11},{wch:28}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Ventes');
  XLSX.writeFile(wb, `ventes-bebeach-${filenameLabel}.xlsx`);
}
function exportVentesExcel(){
  const label = (state.exportFrom || state.exportTo) ? `${state.exportFrom||'debut'}_au_${state.exportTo||'aujourdhui'}` : 'toutes';
  downloadVentesAsExcel(ventesForExport(), label);
}
function exportVentesDuJourCaisse(){
  downloadVentesAsExcel(ventesForCaisse(), `${state.caisseDate}_${state.caisseLieu}`.replace(/\s+/g,'-'));
}

// ---------- Render helpers ----------
function PhotoSafe(photo, alt, size, radius){
  radius = radius || 12;
  const style = `width:${size}px;height:${size}px;border-radius:${radius}px;`;
  if (!photo) return `<div class="thumb thumb-fallback" style="${style}">${ICONS.imageOff}</div>`;
  return `<img class="thumb" src="${escapeHtml(photo)}" alt="${escapeHtml(alt)}" style="${style}" />`;
}
document.addEventListener('error', function(e){
  const img = e.target;
  if (img && img.tagName === 'IMG' && img.classList && img.classList.contains('thumb')){
    const div = document.createElement('div');
    div.className = 'thumb thumb-fallback';
    div.style.cssText = img.style.cssText;
    div.innerHTML = ICONS.imageOff;
    img.replaceWith(div);
  }
}, true);

function Pill(label, active, onclick){
  return `<button class="pill ${active ? 'active' : ''}" onclick="${onclick}">${escapeHtml(label)}</button>`;
}
function SearchBox(id, value, oninput, placeholder){
  return `<div class="search-wrap">
    ${ICONS.search}
    <input id="${id}" class="input" style="padding-left:32px;" placeholder="${escapeHtml(placeholder)}" value="${escapeHtml(value)}" oninput="${oninput}(event)" />
  </div>`;
}
function CollectionPills(){
  return `<div class="pills">
    ${Pill('Toutes', state.collectionFilter==='Toutes', "setCollectionFilter('Toutes')")}
    ${COLLECTIONS.map(c => Pill(c, state.collectionFilter===c, `setCollectionFilter('${c.replace(/'/g,"\\'")}')`)).join('')}
  </div>`;
}
function priceDisplay(color){
  const finalPrice = prixRemise(color);
  if (color.remise > 0){
    return `<span style="text-decoration:line-through;color:var(--ink-soft);font-size:11.5px;margin-right:4px;">${euros(color.prix)}</span><span class="price">${euros(finalPrice)}</span><span class="discount-badge">-${color.remise}%</span>`;
  }
  return `<span class="price">${euros(finalPrice)}</span>`;
}

  const especes = totals['Espèces'] || 0;
  const attendu = fond + especes;
  const comptage = state.caisseComptageReel === '' ? null : parseFloat(state.caisseComptageReel);
  const ecart = comptage == null ? null : +(comptage - attendu).toFixed(2);

  const ventesTousLieux = ventesForDateAllLieux();
  const totalsTous = reglementTotalsFor(ventesTousLieux);
  const totalCATous = ventesTousLieux.reduce((s,v) => s + Number(v.total), 0);

  const cloturesJour = state.clotures.filter(c => c.date === state.caisseDate);
  const fondTousLieux = cloturesJour.reduce((s,c) => s + Number(c.fond_caisse||0), 0);
  const especesTous = totalsTous['Espèces'] || 0;
  const attenduTous = fondTousLieux + especesTous;
  const lieuxAvecVentes = [...new Set(ventesTousLieux.map(v => v.lieu_vente))];
  const lieuxComptes = cloturesJour.filter(c => c.comptage_reel != null);
  const comptageTousSum = lieuxComptes.reduce((s,c) => s + Number(c.comptage_reel), 0);
  const ecartTous = (lieuxAvecVentes.length > 0 && lieuxComptes.length >= lieuxAvecVentes.length)
    ? +(comptageTousSum - attenduTous).toFixed(2) : null;

  return `
  <div style="margin-top:8px;">
    <div class="toolbar">
      <label class="field" style="max-width:200px;">Date
        <input class="input" type="date" value="${state.caisseDate}" onchange="setCaisseDate(this.value)" />
      </label>
      <div class="pills" style="padding-bottom:0;">
        ${state.lieux.map(l => Pill(l.nom, state.caisseLieu===l.nom, `setCaisseLieu('${l.nom.replace(/'/g,"\\'")}')`)).join('')}
      </div>
    </div>

    <div style="font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Tous les lieux confondus — ${new Date(state.caisseDate).toLocaleDateString('fr-FR')}</div>
    <div class="stat-row">
      <div class="stat-card" style="background:var(--sand);">
        <div class="stat-label">Ventes du jour</div>
        <div class="stat-value">${ventesTousLieux.length}</div>
        <div class="stat-sub">Tous lieux</div>
      </div>
      <div class="stat-card" style="background:var(--sand);">
        <div class="stat-label">Chiffre d'affaires</div>
        <div class="stat-value" style="color:var(--coral-deep);">${euros(totalCATous)}</div>
      </div>
      ${MODES_REGLEMENT.map(m => `
        <div class="stat-card" style="background:var(--sand);">
          <div class="stat-label">${escapeHtml(m)}</div>
          <div class="stat-value" style="color:var(--sky-deep);font-size:22px;">${euros(totalsTous[m]||0)}</div>
        </div>`).join('')}
    </div>

    <div style="font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.5px;margin:14px 0 6px;">${escapeHtml(state.caisseLieu)}</div>
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-label">Ventes du jour</div>
        <div class="stat-value">${ventesJour.length}</div>
        <div class="stat-sub">${state.caisseLieu}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Chiffre d'affaires</div>
        <div class="stat-value" style="color:var(--coral-deep);">${euros(totalCA)}</div>
      </div>
      ${MODES_REGLEMENT.map(m => `
        <div class="stat-card">
          <div class="stat-label">${escapeHtml(m)}</div>
          <div class="stat-value" style="color:var(--sky-deep);font-size:22px;">${euros(totals[m]||0)}</div>
        </div>`).join('')}
    </div>

    <div class="panel" style="margin-bottom:18px;">
      <div class="panel-title">${ICONS.cash} Contrôle de caisse — tous lieux confondus</div>
      <div class="sale-row" style="border-bottom:none;">
        <span class="muted">Fond de caisse total (somme des lieux clôturés)</span>
        <span style="font-weight:600;">${euros(fondTousLieux)}</span>
      </div>
      <div class="sale-row" style="border-bottom:none;">
        <span class="muted">Espèces vendues (tous lieux)</span>
        <span style="font-weight:600;">${euros(especesTous)}</span>
      </div>
      <div class="sale-row" style="border-bottom:none;">
        <span class="muted">Attendu en caisse (fond + espèces)</span>
        <span style="font-weight:600;">${euros(attenduTous)}</span>
      </div>
      <div class="sale-row" style="border-bottom:none;">
        <span class="muted">Comptage réel total saisi ${lieuxComptes.length < lieuxAvecVentes.length ? `(${lieuxComptes.length}/${lieuxAvecVentes.length} lieux comptés)` : ''}</span>
        <span style="font-weight:600;">${euros(comptageTousSum)}</span>
      </div>
      <div class="sale-row" style="border-bottom:1px solid var(--line);padding-bottom:10px;">
        <span class="muted">Écart total</span>
        <span style="font-weight:700;color:${ecartTous==null?'var(--ink-soft)':(Math.abs(ecartTous)<0.01?'var(--sage)':'var(--coral-deep)')};">${ecartTous==null ? '— (tous les lieux ne sont pas encore comptés)' : (ecartTous>0?'+':'')+euros(ecartTous)}</span>
      </div>
    </div>

    <div class="grid2">
      <div class="panel">
        <div class="panel-title">${ICONS.cash} Contrôle de caisse (espèces)</div>
        <div class="field-row">
          <label class="field" style="flex:1;">Fond de caisse (début)
            <input id="caisse-fond" class="input" type="text" inputmode="decimal" value="${escapeHtml(state.caisseFondCaisse)}" oninput="updateCaisseField('caisseFondCaisse', this.value)" />
          </label>
          <label class="field" style="flex:1;">Comptage réel (fin de journée)
            <input id="caisse-comptage" class="input" type="text" inputmode="decimal" value="${escapeHtml(state.caisseComptageReel)}" oninput="updateCaisseField('caisseComptageReel', this.value)" />
          </label>
        </div>
        <div class="sale-row" style="border-bottom:none;">
          <span class="muted">Espèces vendues aujourd'hui</span>
          <span style="font-weight:600;">${euros(especes)}</span>
        </div>
        <div class="sale-row" style="border-bottom:none;">
          <span class="muted">Attendu en caisse (fond + espèces)</span>
          <span style="font-weight:600;">${euros(attendu)}</span>
        </div>
        <div class="sale-row" style="border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:12px;">
          <span class="muted">Écart</span>
          <span style="font-weight:700;color:${ecart==null?'var(--ink-soft)':(Math.abs(ecart)<0.01?'var(--sage)':'var(--coral-deep)')};">${ecart==null ? '—' : (ecart>0?'+':'')+euros(ecart)}</span>
        </div>
        <label class="field">Note (facultatif)
          <input id="caisse-note" class="input" value="${escapeHtml(state.caisseNote)}" oninput="updateCaisseField('caisseNote', this.value)" placeholder="Ex : billet déchiré retiré, etc." />
        </label>
        <button class="btn btn-coral" style="width:100%;margin-top:8px;" ${state.saving?'disabled':''} onclick="saveCloture()">${state.saving?'Enregistrement…':'Enregistrer la clôture du jour'}</button>
      </div>

      <div class="panel">
        <div class="panel-title" style="justify-content:space-between;">
          <span>Ventes — ${new Date(state.caisseDate).toLocaleDateString('fr-FR')} · ${escapeHtml(state.caisseLieu)}</span>
          <button type="button" class="btn btn-outline btn-sm" onclick="exportVentesDuJourCaisse()">Exporter ce jour (Excel)</button>
        </div>
        ${ventesJour.length===0 ? '<div class="muted">Aucune vente ce jour, sur ce point de vente.</div>' : ventesJour.map(v => `
          <div class="sale-row">
            <span class="muted">${new Date(v.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})} · ${(v.reglements||[]).map(r=>escapeHtml(r.mode)).join('+')}</span>
            <span style="font-weight:600;">${euros(v.total)}</span>
          </div>`).join('')}
      </div>
    </div>
    ${renderExportPanel()}
  </div>`;
}

function renderExportPanel(){
  return `
  <div class="panel" style="margin-top:18px;">
    <div class="panel-title">${ICONS.history} Export des ventes (Excel)</div>
    <div class="toolbar" style="margin-bottom:10px;">
      <button type="button" class="add-size-btn" onclick="setExportRange('semaine')">Cette semaine</button>
      <button type="button" class="add-size-btn" onclick="setExportRange('mois')">Ce mois</button>
      <button type="button" class="add-size-btn" onclick="setExportRange('tout')">Tout</button>
    </div>
    <div class="field-row">
      <label class="field" style="flex:1;">Du
        <input id="export-from" class="input" type="date" value="${state.exportFrom}" oninput="updateExportField('exportFrom', this.value)" />
      </label>
      <label class="field" style="flex:1;">Au
        <input id="export-to" class="input" type="date" value="${state.exportTo}" oninput="updateExportField('exportTo', this.value)" />
      </label>
      <label class="field" style="flex:1;">Lieu de vente
        <select class="input" onchange="setExportLieu(this.value)">
          <option value="Tous" ${state.exportLieu==='Tous'?'selected':''}>Tous</option>
          ${state.lieux.map(l => `<option value="${escapeHtml(l.nom)}" ${state.exportLieu===l.nom?'selected':''}>${escapeHtml(l.nom)}</option>`).join('')}
        </select>
      </label>
    </div>
    <div class="muted" style="margin-bottom:10px;">${ventesForExport().length} vente(s) correspondent à ces filtres.</div>
    <button class="btn btn-coral" onclick="exportVentesExcel()">Télécharger le fichier Excel</button>
  </div>`;
}

function renderColorBlock(c, index){
  const finalPrice = prixRemise({ prix: parseFloat(c.prix)||0, remise: parseFloat(c.remise)||0 });
  return `
  <div class="color-block">
    <div class="color-block-header">
      <div class="color-block-title">Couleur ${index + 1}${c.couleur ? ' — ' + escapeHtml(c.couleur) : ''}</div>
      ${state.formColors.length > 1 ? `<button type="button" class="mini-btn" style="color:var(--coral-deep);" onclick="removeColorBlock('${c.key}')">${ICONS.x}</button>` : ''}
    </div>
    <div class="color-preview-row">
      ${PhotoSafe(c.photo, c.couleur, 56, 10)}
      <img src="${qrUrl(c.code || 'BB-0000', 56)}" width="56" height="56" alt="QR" style="border-radius:6px;" />
      <div style="flex:1;min-width:0;">
        <div class="field-row" style="margin-bottom:0;">
          <label class="field" style="flex:1;">Couleur
            <input class="input" value="${escapeHtml(c.couleur)}" placeholder="Ex : Bleu ciel" oninput="updateColorField('${c.key}','couleur',this.value)" />
          </label>
        </div>
      </div>
    </div>
    <div class="field-row">
      <label class="field" style="flex:1.4;">Code (QR / code-barres)
        <div style="display:flex;gap:6px;">
          <input class="input" value="${escapeHtml(c.code)}" oninput="updateColorField('${c.key}','code',this.value)" />
          <button type="button" class="add-size-btn" onclick="regenerateColorCode('${c.key}')">Générer</button>
        </div>
      </label>
    </div>
    <div class="field-row">
      <label class="field" style="flex:1;">Prix (€)
        <input class="input" type="number" min="0" step="0.5" value="${c.prix}" oninput="updateColorField('${c.key}','prix',this.value)" />
      </label>
      <label class="field" style="flex:1;">Remise (%)
        <input class="input" type="number" min="0" max="100" step="1" value="${c.remise}" oninput="updateColorField('${c.key}','remise',this.value)" />
      </label>
      <label class="field" style="flex:1;">Photo (URL)
        <input class="input" value="${escapeHtml(c.photo||'')}" placeholder="https://..." oninput="updateColorField('${c.key}','photo',this.value)" />
      </label>
    </div>
    ${(parseFloat(c.remise)||0) > 0 ? `<div class="price-preview">Prix remisé : <b>${euros(finalPrice)}</b> <span style="text-decoration:line-through;">${euros(parseFloat(c.prix)||0)}</span></div>` : ''}
    <div class="variant-editor">
      <div style="font-size:12px;color:var(--ink-soft);margin-bottom:8px;">Tailles &amp; stock (pour cette couleur)</div>
      ${c.variants.map(v => `
        <div class="variant-editor-row">
          <input class="input taille-input" placeholder="Taille" value="${escapeHtml(v.taille)}" oninput="updateColorVariantField('${c.key}','${v.key}','taille',this.value)" />
          <input class="input" type="number" min="0" placeholder="Stock" value="${v.stock}" oninput="updateColorVariantField('${c.key}','${v.key}','stock',this.value)" />
          <button type="button" class="mini-btn" style="color:var(--coral-deep);" onclick="removeVariantRowFromColor('${c.key}','${v.key}')">${ICONS.x}</button>
        </div>`).join('')}
      <div class="add-size-row">
        <button type="button" class="add-size-btn" onclick="addVariantRowToColor('${c.key}','')">+ Ajouter une taille</button>
        <button type="button" class="add-size-btn" onclick="addAllStandardSizesToColor('${c.key}')">+ XS → XXL</button>
      </div>
    </div>
  </div>`;
}

function renderForm(){
  if (!state.showForm) return '';
  const a = state.editing || { nom:'', collection:COLLECTIONS[0], seuil:3 };
  return `
  <div class="modal-backdrop" onclick="if(event.target===this) closeForm()">
    <div class="modal">
      <div class="modal-header">
        <div class="serif" style="font-size:19px;font-weight:600;">${state.editing ? "Modifier l'article" : 'Nouvel article'}</div>
        <button class="modal-close" onclick="closeForm()">${ICONS.x}</button>
      </div>
      <form onsubmit="saveArticleForm(event)">
        <label class="field">Nom de l'article
          <input class="input" name="nom" required value="${escapeHtml(a.nom)}" placeholder="Ex : T-shirt Vagues" />
        </label>
        <div class="field-row">
          <label class="field" style="flex:2;">Collection
            <select class="input" name="collection">
              ${COLLECTIONS.map(col => `<option value="${escapeHtml(col)}" ${a.collection===col?'selected':''}>${escapeHtml(col)}</option>`).join('')}
            </select>
          </label>
          <label class="field" style="flex:1;">Seuil alerte
            <input class="input" type="number" min="0" name="seuil" value="${a.seuil}" />
          </label>
        </div>
        <div class="hint">Astuce photo : utilise un lien d'image (ex. depuis bebeach.fr) plutôt qu'un fichier importé — ça évite de stocker de grosses images. Chaque couleur a son propre QR code, prix et remise.</div>

        ${state.formColors.map((c, i) => renderColorBlock(c, i)).join('')}
        <button type="button" class="btn btn-outline" style="width:100%;margin-bottom:14px;" onclick="addColorBlock()">+ Ajouter une couleur</button>

        <div class="modal-actions">
          <button type="button" class="btn btn-outline" style="flex:1;" onclick="closeForm()">Annuler</button>
          <button type="submit" class="btn btn-coral" style="flex:1;" ${state.saving?'disabled':''}>${state.saving ? 'Enregistrement…' : 'Enregistrer'}</button>
        </div>
      </form>
    </div>
  </div>`;
}

function render(){
  const root = document.getElementById('app');
  if (state.loading && state.articles.length===0){
    root.innerHTML = '<div class="loading-screen">Chargement de la boutique…</div>';
    return;
  }
  let body = '';
  if (state.error){
    body = `<div class="container" style="margin-top:24px;"><div class="panel" style="color:var(--coral-deep);">${escapeHtml(state.error)}</div></div>`;
  } else {
    let content = '';
    if (state.tab==='dashboard') content = renderDashboard();
    else if (state.tab==='stock') content = renderStock();
    else if (state.tab==='vente') content = renderVente();
    else if (state.tab==='caisse') content = renderCaisse();
    else if (state.tab==='historique') content = renderHistorique();
    body = `<div class="container">${content}</div>`;
  }
  root.innerHTML = renderHeader() + body + renderForm() + renderToast() + renderMiniCartBar();
}

function renderToast(){
  if (!state.toast) return '';
  const bg = state.toast.kind === 'error' ? 'var(--coral-deep)' : 'var(--sage)';
  return `<div class="toast" style="background:${bg};">${ICONS.check}<span>${escapeHtml(state.toast.message)}</span></div>`;
}

function renderMiniCartBar(){
  if (state.tab !== 'vente') return '';
  const detail = panierDetail();
  if (detail.length === 0) return '';
  const count = detail.reduce((s,p) => s + p.qty, 0);
  return `<button class="mini-cart-bar" onclick="document.getElementById('cart-panel').scrollIntoView({behavior:'smooth',block:'start'})">
    ${ICONS.bag} ${count} article${count>1?'s':''} · ${euros(panierTotal())} · voir le panier
  </button>`;
}

// ---------- Realtime sync across devices (Mac <-> iPhone) ----------
let realtimeReloadTimer = null;
function scheduleRealtimeReload(){
  clearTimeout(realtimeReloadTimer);
  realtimeReloadTimer = setTimeout(() => { loadAll(); }, 400);
}
sb.channel('bebeach-realtime')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'articles' }, scheduleRealtimeReload)
  .on('postgres_changes', { event: '*', schema: 'public', table: 'article_colors' }, scheduleRealtimeReload)
  .on('postgres_changes', { event: '*', schema: 'public', table: 'article_variants' }, scheduleRealtimeReload)
  .on('postgres_changes', { event: '*', schema: 'public', table: 'ventes' }, scheduleRealtimeReload)
  .on('postgres_changes', { event: '*', schema: 'public', table: 'cloture_caisse' }, scheduleRealtimeReload)
  .on('postgres_changes', { event: '*', schema: 'public', table: 'lieux_vente' }, scheduleRealtimeReload)
  .subscribe();

loadAll();
</script>
</body>
</html>
